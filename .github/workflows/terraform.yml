# .github/workflows/terraform.yml
name: 'Terraform CI'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Añade esta línea bajo 'env'
    steps:
      ...
    steps:
    # 1. Checkout the repository to the GitHub Actions runner
    - name: Checkout
      uses: actions/checkout@v4

    # 2. Setup Terraform CLI
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # 3. Configure AWS Credentials for the runner
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # 4. Initialize Terraform and download provider plugins
    - name: Terraform Init
      run: terraform -chdir=infrastructure init

    # 5. Validate the configuration for syntax errors
    - name: Terraform Validate
      run: terraform -chdir=infrastructure validate

    # 6. Run Checkov Security Scan
    - name: Run Checkov Security Scan
      uses: bridgecrewio/checkov-action@master
      with:
        directory: infrastructure
        framework: terraform
        quiet: false # Cambiado a false para depurar
        # Fuerza el uso de la versión más reciente para evitar el aviso de Node.js
        force_failure: true
    
    # 7. Plan the changes to be applied
    - name: Terraform Plan
      run: terraform -chdir=infrastructure plan -input=false

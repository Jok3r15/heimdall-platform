# .github/workflows/terraform.yml
name: 'Terraform CI'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  terraform:
    name: 'Terraform'
    runs-on: ubuntu-latest

    steps:
    # Checkout the repository to the GitHub Actions runner
    - name: Checkout
      uses: actions/checkout@v4

    # Install Terraform on the runner
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # Configure AWS credentials using the secrets you added
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # Initialize Terraform and download plugins
    - name: Terraform Init
      run: terraform -chdir=infrastructure init

    # Validate the configuration
    - name: Terraform Validate
      run: terraform -chdir=infrastructure validate

    # Plan the changes
    - name: Terraform Plan
      run: terraform -chdir=infrastructure plan -input=false

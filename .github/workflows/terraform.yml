# .github/workflows/terraform.yml
name: 'Terraform CI'

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      # Force Node.js 24 to avoid deprecation warnings from GitHub Actions
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    # 1. Checkout the repository
    - name: Checkout
      uses: actions/checkout@v4

    # 2. Setup Terraform CLI
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    # 3. Configure AWS Credentials
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # 4. Initialize Terraform
    - name: Terraform Init
      run: terraform -chdir=infrastructure init

    # 5. Validate the configuration
    - name: Terraform Validate
      run: terraform -chdir=infrastructure validate

    # 6. Run Checkov Security Scan
    - name: Run Checkov Security Scan
      uses: bridgecrewio/checkov-action@master
      with:
        directory: infrastructure
        framework: terraform
        # Skip noise checks for default VPC/SG configurations and non-critical warnings
        # CKV2_AWS_12: Default SG isolation
        # CKV_AWS_130: Public IP assignment
        # CKV_AWS_382: Broad egress rules
        skip_check: CKV2_AWS_12,CKV_AWS_130,CKV_AWS_382
        force_failure: true
        quiet: false

    # 7. Plan the changes
    - name: Terraform Plan
      run: terraform -chdir=infrastructure plan -input=false
